<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — KaizenOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F5F0E8;
      color: #2D2A26;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(45,42,38,0.12);
    }
    .icon {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: #6B8F71;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
      color: #FAF7F0;
      font-weight: 700;
      font-family: Georgia, serif;
    }
    h1 { font-family: Georgia, serif; font-size: 22px; font-weight: 600; margin-bottom: 10px; }
    p { font-size: 14px; color: rgba(45,42,38,0.5); line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #6B8F71; color: #fff; border: none; cursor: pointer;
      padding: 12px 28px; border-radius: 14px; font-size: 14px; font-weight: 600;
      box-shadow: 0 2px 12px rgba(107,143,113,0.35);
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">K</div>
    <h1>You're offline</h1>
    <p>No internet connection detected. Sessions you log will be queued and synced automatically when you reconnect.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
